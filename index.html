<body>

  <!-- ============ HEADER / NAV ============ -->
  <header class="site-header" id="top">

            <button id="menuBtn" class="nav-toggle" aria-haspopup="true" aria-expanded="false" aria-controls="mainMenu" aria-label="Navigation öffnen"><span class="nav-icon" aria-hidden="true"></span><span class="sr-only">Menü</span></button>
            <ul id="mainMenu" class="nav-menu" role="menu" hidden>

            </ul>
          </div>
        </nav>
      </div>
    </div>

  <main>

    <!-- ============ HERO ============ -->
    <section class="hero" aria-label="Startseite">
      <div class="hero-copy">
        <h1 class="hero-name">
          <span>Tobias</span>
          <span>Franzl</span>
        </h1>

        <p class="hero-tag">
          <span data-i18n="heroLine1">Industrierückbau</span>
          <span class="hero-dot">·</span>
          <span data-i18n="heroLine2">Recyclinglösungen</span>
        </p>
      </div>

      <img class="hero-photo" src="portrait.png" alt="Portrait von Tobias Franzl" loading="eager" fetchpriority="high" decoding="async" width="1082" height="1454" />
    </section>

    <!-- ============ 02 · KONTAKT ============ -->
    <section class="section contact reveal" id="kontakt" aria-labelledby="contact-heading">
      <h2 class="section-heading" id="contact-heading" data-i18n="contactHeading">Kontakt</h2>

      <div class="contact-grid">
        <div class="contact-form-wrap">
          <p class="contact-intro" data-i18n="contactIntro">Schreib mir eine Nachricht. Ich freue mich, von dir zu hören.</p>

          <form
            name="kontakt"
            method="POST"
            data-netlify="true"
            data-netlify-recaptcha="true"
            netlify-honeypot="bot-field"
            class="contact-form"
          >
            <input type="hidden" name="form-name" value="kontakt" />

            <p class="hp-field">
              <label>Bitte leer lassen: <input name="bot-field" /></label>
            </p>

            <div class="field">
              <label for="name" data-i18n="nameLabel">Name</label>
              <input type="text" id="name" name="name" autocomplete="name" required />
            </div>

            <div class="field">
              <label for="telefon">
                <span data-i18n="phoneLabel">Telefonnummer</span> <span class="optional-label" data-i18n="optionalLabel">optional</span>
              </label>
              <input
                type="tel"
                id="telefon"
                name="telefon"
                autocomplete="tel"
                inputmode="tel"
                pattern="^\+?[0-9\s]+$"
                title="Bitte mit Ländervorwahl eingeben, z. B. +43 664 1234567. Erlaubt sind Zahlen, Leerzeichen und optional ein + am Anfang."
              />
              <p class="field-hint" data-i18n="phoneHint">Mit Ländervorwahl, z. B. +43 664 1234567</p>
            </div>

            <div class="field">
              <label for="email" data-i18n="emailLabel">E-Mail</label>
              <input type="email" id="email" name="email" autocomplete="email" required />
            </div>

            <div class="field">
              <label for="nachricht" data-i18n="messageLabel">Nachricht</label>
              <textarea id="nachricht" name="nachricht" rows="6" required></textarea>
            </div>

            <div class="captcha-wrap" data-netlify-recaptcha="true"></div>

            <button type="submit" class="submit-btn" data-i18n="sendButton">Absenden</button>
            <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>

  </main>
